operations: general

#
# Accounting books.
#
# Books hold historically retrievable, per-gid, per-currency segregated balances.
#
books:
  # Merchant
  - merchant_available
  - merchant_withheld
  - merchant_pending
  - merchant_locked
  - merchant_adjusted
  - merchant_credit:
      non_negative: true

  # Partner
  - partner_available
  - partner_withheld
  - partner_pending
  - partner_locked
  - partner_adjusted
  - partner_credit:
      non_negative: true

  # Customer
  - customer_available
  - customer_withheld
  - customer_pending
  - customer_locked
  - customer_adjusted
  - customer_credit:
      non_negative: true
  
  # Withdrawals
  - wdw
  - wdw_request
  - wdw_merchant
  - wdw_merchant_request
  - wdw_partner
  - wdw_partner_request
  - wdw_customer
  - wdw_customer_request

  # Deposits
  - merchant_deposit
  - customer_deposit
  - partner_deposit

  # Payment Processing: PSP, gateway
  - payment

  - charged
  - charged_bank_transfer
  - charged_credit_card
  - charged_debit_card
  - charged_wallet
  - charged_pix

  - payment_fee_bank_transfer
  - payment_fee_credit_card
  - payment_fee_debit_card
  - payment_fee_wallet
  - payment_fee_pix

  # Trade Operation
  - customer_allocation
  - customer_trade
  - customer_trade_fee


#
# Entry pairs.
#
# Books are pairwise recorded wrapped in entry pairs.
# Custom entry pairs use verbs to denote motion between books.
#
entry_pairs:
  # Balances
  withhold_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_withheld
  settle_merchant_balance:
    book_sub: merchant_pending
    book_add: merchant_available
  lock_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_locked
  adjust_merchant_balance:
    book_sub: merchant_adjusted
    book_add: merchant_available
  apply_merchant_credit:
    book_sub: merchant_credit
    book_add: merchant_available

  withhold_customer_balance:
    book_sub: customer_available
    book_add: customer_withheld
  settle_customer_balance:
    book_sub: customer_pending
    book_add: customer_available
  lock_customer_balance:
    book_sub: customer_available
    book_add: customer_locked
  adjust_customer_balance:
    book_sub: customer_adjusted
    book_add: customer_available
  apply_customer_credit:
    book_sub: customer_credit
    book_add: customer_available

  withhold_partner_balance:
    book_sub: partner_available
    book_add: partner_withheld
  settle_partner_balance:
    book_sub: partner_pending
    book_add: partner_available
  lock_partner_balance:
    book_sub: partner_available
    book_add: partner_locked
  adjust_partner_balance:
    book_sub: partner_adjusted
    book_add: partner_available
  apply_partner_credit:
    book_sub: partner_credit
    book_add: partner_available
  
  # Deposits
  deposit_merchant:
    book_sub: merchant_deposit
    book_add: merchant_available
  deposit_customer:
    book_sub: customer_deposit
    book_add: customer_available
  deposit_partner:
    book_sub: partner_deposit
    book_add: partner_available

  # Charges
  charge_bank_transfer:
    book_sub: charged_bank_transfer
    book_add: payment
  charge_credit_card:
    book_sub: charged_credit_card
    book_add: payment
  charge_debit_card:
    book_sub: charged_debit_card
    book_add: payment
  charge_wallet:
    book_sub: charged_wallet
    book_add: payment
  charge_pix:
    book_sub: charged_pix
    book_add: payment

  # Charge fees
  charge_bank_transfer_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_bank_transfer

  charge_credit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_credit_card
  
  charge_debit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_debit_card
  
  charge_wallet_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_wallet
  charge_wallet_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_wallet
  charge_wallet_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_wallet

  charge_pix_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_pix
  charge_pix_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_pix
  charge_pix_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_pix

  # Splits
  split_payment_merchant:
    book_sub: payment
    book_add: merchant_pending
  split_payment_partner:
    book_sub: payment
    book_add: partner_pending

  # Trade Operation
  allocate_customer:
    book_sub: customer_available
    book_add: customer_allocation
  trade:
    book_sub: customer_trade
    book_add: customer_allocation
  trade_fee:
    book_sub: customer_trade_fee
    book_add: customer_allocation
