  # Charges
  charge_identified_customer:
    book_sub: pp_charge_identified_customer
    book_add: pp_charge_merchant
  charge_unidentified_customer:
    book_sub: pp_charge_unidentified_customer
    book_add: pp_charge_merchant

  # Payments
  pay_internal:
    book_sub: payment_internal
    book_add: payment
  pay_manual:
    book_sub: payment_manual
    book_add: payment
  pay_bank_transfer:
    book_sub: payment_bank_transfer
    book_add: payment
  pay_credit_card:
    book_sub: payment_credit_card
    book_add: payment
  pay_debit_card:
    book_sub: payment_debit_card
    book_add: payment
  pay_wallet:
    book_sub: payment_wallet
    book_add: payment
  pay_pix:
    book_sub: payment_pix
    book_add: payment

  # Splits
  split_merchant:
    book_sub: pp_payment
    book_add: merchant_withholding
  split_partner:
    book_sub: pp_payment
    book_add: partner_withholding
