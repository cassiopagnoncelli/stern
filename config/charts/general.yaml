operations: general

#
# Accounting books.
#
# Books hold historically retrievable, per-gid, per-currency segregated balances.
# Naming conventions:
# - available: immediately available for general operations
# - withheld: frozen capital by management rule used as collateral
# - inbound: incoming funds
# - outbound: outgoing funds
# - adjusted: manually adjusted available balance
# - credit: untransferable credits used to automatically rebate fees
#
books:
  # Merchant
  #
  # `*_outbound` and `*_withheld` are non_negative so UnlockBalance and
  # ReleaseWithheldBalance cannot over-debit a stakeholder's outbound or
  # withheld slice (DB-level backstop behind each op's friendly pre-check).
  - merchant_available
  - merchant_withheld:
      non_negative: true
  - merchant_inbound
  - merchant_outbound:
      non_negative: true
  - merchant_adjusted
  - merchant_credit:
      non_negative: true

  # Partner
  - partner_available
  - partner_withheld:
      non_negative: true
  - partner_inbound
  - partner_outbound:
      non_negative: true
  - partner_adjusted
  - partner_credit:
      non_negative: true

  # Customer
  - customer_available
  - customer_withheld:
      non_negative: true
  - customer_inbound
  - customer_outbound:
      non_negative: true
  - customer_adjusted
  - customer_credit:
      non_negative: true
  
  # Withdrawals.
  # `wdw_*_outbound` and `wdw_*_confirmed` are non_negative so the Cancel/Reverse
  # ops cannot over-debit a withdrawal stage (DB-level backstop behind each op's
  # friendly pre-check).
  - wdw_merchant_outbound:
      non_negative: true
  - wdw_merchant_confirmed:
      non_negative: true
  - wdw_merchant_fee

  - wdw_partner_outbound:
      non_negative: true
  - wdw_partner_confirmed:
      non_negative: true
  - wdw_partner_fee

  - wdw_customer_outbound:
      non_negative: true
  - wdw_customer_confirmed:
      non_negative: true
  - wdw_customer_fee

  # Deposits
  - merchant_deposit
  - customer_deposit
  - partner_deposit

  # Payment Processing: PSP, gateway
  - payment

  - charged_bank_transfer
  - charged_credit_card
  - charged_debit_card
  - charged_wallet
  - charged_pix

  - payment_fee_bank_transfer
  - payment_fee_credit_card
  - payment_fee_debit_card
  - payment_fee_wallet
  - payment_fee_pix

  # Refunds
  - refund_outbound:
      non_negative: true
  - refund_confirmed

  - refund_fee_merchant
  - refund_fee_partner

  # Chargebacks
  - chargeback_outbound:
      non_negative: true
  - chargeback_loss

  - chargeback_fee_merchant
  - chargeback_fee_partner

  # Investment
  - customer_investment
  - customer_trade
  - customer_trade_fee


#
# Entry pairs.
#
# Books are pairwise recorded wrapped in entry pairs.
# Custom entry pairs use verbs to denote motion between books.
#
entry_pairs:
  # Balances
  #
  # `lock_*_balance` / `unlock_*_balance` form a two-state lifecycle
  # `*_available <-> *_outbound`. Unlike withdrawals, there's no `confirmed`
  # companion, so a single inverse pair (UnlockBalance) suffices.
  # `withhold_*_balance` / `release_withheld_*_balance` form the same
  # two-state lifecycle for `*_available <-> *_withheld` (ReleaseWithheldBalance).
  withhold_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_withheld
  release_withheld_merchant_balance:
    book_sub: merchant_withheld
    book_add: merchant_available
  settle_merchant_balance:
    book_sub: merchant_inbound
    book_add: merchant_available
  lock_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_outbound
  unlock_merchant_balance:
    book_sub: merchant_outbound
    book_add: merchant_available
  adjust_merchant_balance:
    book_sub: merchant_adjusted
    book_add: merchant_available
  apply_merchant_credit:
    book_sub: merchant_credit
    book_add: merchant_available

  withhold_partner_balance:
    book_sub: partner_available
    book_add: partner_withheld
  release_withheld_partner_balance:
    book_sub: partner_withheld
    book_add: partner_available
  settle_partner_balance:
    book_sub: partner_inbound
    book_add: partner_available
  lock_partner_balance:
    book_sub: partner_available
    book_add: partner_outbound
  unlock_partner_balance:
    book_sub: partner_outbound
    book_add: partner_available
  adjust_partner_balance:
    book_sub: partner_adjusted
    book_add: partner_available
  apply_partner_credit:
    book_sub: partner_credit
    book_add: partner_available

  withhold_customer_balance:
    book_sub: customer_available
    book_add: customer_withheld
  release_withheld_customer_balance:
    book_sub: customer_withheld
    book_add: customer_available
  settle_customer_balance:
    book_sub: customer_inbound
    book_add: customer_available
  lock_customer_balance:
    book_sub: customer_available
    book_add: customer_outbound
  unlock_customer_balance:
    book_sub: customer_outbound
    book_add: customer_available
  adjust_customer_balance:
    book_sub: customer_adjusted
    book_add: customer_available
  apply_customer_credit:
    book_sub: customer_credit
    book_add: customer_available
  
  # Withdrawals
  #
  # Lifecycle per stakeholder type:
  #   *_available -> wdw_*_outbound     (LockWithdrawal)
  #   wdw_*_outbound -> *_available     (CancelWithdrawal, before settlement)
  #   wdw_*_outbound -> wdw_*_confirmed (ConfirmWithdrawal, on settlement)
  #   wdw_*_confirmed -> *_available    (ReverseWithdrawal, post-settlement reject)
  #
  # `wdw_*_outbound` carries in-flight withdrawals; `wdw_*_confirmed` accumulates
  # settled ones (reversible only via ReverseWithdrawal).
  lock_withdrawal_merchant:
    book_sub: merchant_available
    book_add: wdw_merchant_outbound
  cancel_withdrawal_merchant:
    book_sub: wdw_merchant_outbound
    book_add: merchant_available
  confirm_withdrawal_merchant:
    book_sub: wdw_merchant_outbound
    book_add: wdw_merchant_confirmed
  reverse_withdrawal_merchant:
    book_sub: wdw_merchant_confirmed
    book_add: merchant_available

  lock_withdrawal_partner:
    book_sub: partner_available
    book_add: wdw_partner_outbound
  cancel_withdrawal_partner:
    book_sub: wdw_partner_outbound
    book_add: partner_available
  confirm_withdrawal_partner:
    book_sub: wdw_partner_outbound
    book_add: wdw_partner_confirmed
  reverse_withdrawal_partner:
    book_sub: wdw_partner_confirmed
    book_add: partner_available

  lock_withdrawal_customer:
    book_sub: customer_available
    book_add: wdw_customer_outbound
  cancel_withdrawal_customer:
    book_sub: wdw_customer_outbound
    book_add: customer_available
  confirm_withdrawal_customer:
    book_sub: wdw_customer_outbound
    book_add: wdw_customer_confirmed
  reverse_withdrawal_customer:
    book_sub: wdw_customer_confirmed
    book_add: customer_available
  
  # Withdrawal fees
  charge_withdrawal_fee_merchant:
    book_sub: merchant_available
    book_add: wdw_merchant_fee
  charge_withdrawal_fee_partner:
    book_sub: partner_available
    book_add: wdw_partner_fee
  charge_withdrawal_fee_customer:
    book_sub: customer_available
    book_add: wdw_customer_fee
  
  # Deposits
  confirm_deposit_merchant:
    book_sub: merchant_deposit
    book_add: merchant_available

  confirm_deposit_partner:
    book_sub: partner_deposit
    book_add: partner_available

  confirm_deposit_customer:
    book_sub: customer_deposit
    book_add: customer_available

  # Charges
  charge_bank_transfer:
    book_sub: charged_bank_transfer
    book_add: payment
  charge_credit_card:
    book_sub: charged_credit_card
    book_add: payment
  charge_debit_card:
    book_sub: charged_debit_card
    book_add: payment
  charge_wallet:
    book_sub: charged_wallet
    book_add: payment
  charge_pix:
    book_sub: charged_pix
    book_add: payment

  # Charge fees
  charge_bank_transfer_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_bank_transfer

  charge_credit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_credit_card
  
  charge_debit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_debit_card
  
  charge_wallet_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_wallet
  charge_wallet_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_wallet
  charge_wallet_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_wallet

  charge_pix_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_pix
  charge_pix_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_pix
  charge_pix_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_pix

  # Splits
  split_payment_merchant:
    book_sub: payment
    book_add: merchant_inbound
  split_payment_partner:
    book_sub: payment
    book_add: partner_inbound
  
  # Refunds
  lock_refund_merchant:
    book_sub: merchant_available
    book_add: refund_outbound
  lock_refund_partner:
    book_sub: partner_available
    book_add: refund_outbound

  # Pre-confirm cancel (gateway declined the refund). Mirrors lock_refund_*
  # keying by funder so the released funds return to the same available book
  # they were drawn from. Use only before confirm_refund; once confirmed the
  # refund_outbound balance has drained to refund_confirmed and there is no
  # cancel path — handle post-settlement reversals as a separate flow.
  cancel_refund_merchant:
    book_sub: refund_outbound
    book_add: merchant_available
  cancel_refund_partner:
    book_sub: refund_outbound
    book_add: partner_available

  confirm_refund:
    book_sub: refund_outbound
    book_add: refund_confirmed
  # Refund is a liability transfer, not a P&L event: funds move from the
  # funder's available book to customer_available, conserving total platform
  # liability. Funder identity (merchant vs partner) is consumed at
  # lock_refund_*, so refund_confirmed is fungible and settle has only one
  # destination by design. If refunds ever need to route elsewhere
  # (void-to-merchant, third party), split into settle_refund_customer /
  # settle_refund_merchant variants and re-thread funder identity through
  # confirm_refund.
  settle_refund:
    book_sub: refund_confirmed
    book_add: customer_available
  
  # Post-settlement refund reversal. Mirrors ReverseWithdrawal's "terminal
  # state back to available" idiom: drains directly from customer_available
  # to the funder's available book without retracing through refund_confirmed
  # / refund_outbound. Funder identity is consumed at lock_refund_*, drained
  # into the fungible refund_confirmed, and lost — so the caller must
  # re-supply it (merchant vs partner) on reversal. Entries land at
  # gid=funder; the customer's per-customer view stays untouched but the
  # customer_available book sums to neutral across gids per cause.
  reverse_refund_merchant:
    book_sub: customer_available
    book_add: merchant_available
  reverse_refund_partner:
    book_sub: customer_available
    book_add: partner_available

  # Refund fees
  charge_refund_fee_merchant:
    book_sub: merchant_available
    book_add: refund_fee_merchant
  
  charge_refund_fee_partner:
    book_sub: partner_available
    book_add: refund_fee_partner
  
  # Chargebacks
  lock_chargeback_merchant:
    book_sub: merchant_available
    book_add: chargeback_outbound
  lock_chargeback_partner:
    book_sub: partner_available
    book_add: chargeback_outbound
  
  # Chargeback is loss recognition, not a liability transfer: chargeback_loss
  # is a terminal P&L sink (parallel to chargeback_fee_*), since the issuing
  # bank has already paid the cardholder externally. There is no settle step.
  # Dispute reversals route through reverse_chargeback_merchant /
  # reverse_chargeback_partner below — never call Chargeback with a negative
  # amount.
  confirm_chargeback:
    book_sub: chargeback_outbound
    book_add: chargeback_loss

  # Post-settlement chargeback reversal (issuer overturned the dispute).
  # Recovers the loss directly to the funder's available book. Funder
  # identity was consumed at lock_chargeback_*, so the caller must re-supply
  # it (merchant vs partner). Entries land at gid=funder (per-stakeholder
  # attribution, matching reverse_withdrawal_*); chargeback_loss is *not*
  # non_negative because reversals create offsetting entries at gid=funder
  # rather than draining the original gid=chargeback_id slot. Over-reversal
  # protection is the caller's responsibility (idem_key on the dispute event).
  reverse_chargeback_merchant:
    book_sub: chargeback_loss
    book_add: merchant_available
  reverse_chargeback_partner:
    book_sub: chargeback_loss
    book_add: partner_available

  # Chargeback fees
  charge_chargeback_fee_merchant:
    book_sub: merchant_available
    book_add: chargeback_fee_merchant
  
  charge_chargeback_fee_partner:
    book_sub: partner_available
    book_add: chargeback_fee_partner

  # Investments
  investment_invest:
    book_sub: customer_available
    book_add: customer_investment
  investment_trade_operation:
    book_sub: customer_available
    book_add: customer_investment
  investment_trade:
    book_sub: customer_trade
    book_add: customer_investment
  investment_trade_fee:
    book_sub: customer_trade_fee
    book_add: customer_investment
