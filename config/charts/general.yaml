operations: general

#
# Accounting books.
#
# Books hold historically retrievable, per-gid, per-currency segregated balances.
#
books:
  # Merchant
  - merchant_available
  - merchant_withheld
  - merchant_pending
  - merchant_locked
  - merchant_adjusted
  - merchant_credit:
      non_negative: true

  # Partner
  - partner_available
  - partner_withheld
  - partner_pending
  - partner_locked
  - partner_adjusted
  - partner_credit:
      non_negative: true

  # Customer
  - customer_available
  - customer_withheld
  - customer_pending
  - customer_locked
  - customer_adjusted
  - customer_credit:
      non_negative: true
  
  # Withdrawals
  - wdw
  - wdw_request
  - wdw_merchant
  - wdw_merchant_request
  - wdw_partner
  - wdw_partner_request
  - wdw_customer
  - wdw_customer_request

  # Payment Processing: PSP, gateway
  - payment
  - payment_bank_transfer
  - payment_credit_card
  - payment_wallet
  - payment_pix

  - charged
  - charged_bank_transfer
  - charged_credit_card
  - charged_wallet
  - charged_pix

  - payment_fee

  # Accounting
  #
  - merchant_payment
  - identified_customer_payment
  - unidentified_customer_payment

#
# Entry pairs.
#
# Books are pairwise recorded wrapped in entry pairs.
# Custom entry pairs use verbs to denote motion between books.
#
entry_pairs:
  # Payments
  charge_pix:
    book_sub: charged_pix
    book_add: payment

  # Splits
  split_payment_merchant:
    book_sub: payment
    book_add: merchant_pending
  split_payment_partner:
    book_sub: payment
    book_add: partner_pending

  # Settle
  settle_merchant_balance:
    book_sub: merchant_pending
    book_add: merchant_available
  settle_partner_balance:
    book_sub: partner_pending
    book_add: partner_available

  # Charge fees
  charge_pix_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee
  charge_pix_fee_partner:
    book_sub: partner_available
    book_add: payment_fee
