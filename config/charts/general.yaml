operations: general

#
# Accounting books.
#
# Books hold historically retrievable, per-gid, per-currency segregated balances.
# Naming conventions:
# - available: immediately available for general operations
# - withheld: frozen capital by management rule used as collateral
# - pending: incoming funds
# - locked: outgoing funds
# - adjusted: manually adjusted available balance
# - credit: untransferable credits used to automatically rebate fees
#
books:
  # Merchant
  - merchant_available
  - merchant_withheld
  - merchant_pending
  - merchant_locked
  - merchant_adjusted
  - merchant_credit:
      non_negative: true

  # Partner
  - partner_available
  - partner_withheld
  - partner_pending
  - partner_locked
  - partner_adjusted
  - partner_credit:
      non_negative: true

  # Customer
  - customer_available
  - customer_withheld
  - customer_pending
  - customer_locked
  - customer_adjusted
  - customer_credit:
      non_negative: true
  
  # Withdrawals.
  # `*_locked` and `*_confirmed` are non_negative so the Cancel/Reverse ops
  # cannot over-debit a withdrawal stage (DB-level backstop behind each op's
  # friendly pre-check).
  - wdw_merchant_locked:
      non_negative: true
  - wdw_merchant_confirmed:
      non_negative: true
  - wdw_merchant_fee

  - wdw_partner_locked:
      non_negative: true
  - wdw_partner_confirmed:
      non_negative: true
  - wdw_partner_fee

  - wdw_customer_locked:
      non_negative: true
  - wdw_customer_confirmed:
      non_negative: true
  - wdw_customer_fee

  # Deposits
  - merchant_deposit
  - customer_deposit
  - partner_deposit

  # Payment Processing: PSP, gateway
  - payment

  - charged_bank_transfer
  - charged_credit_card
  - charged_debit_card
  - charged_wallet
  - charged_pix

  - payment_fee_bank_transfer
  - payment_fee_credit_card
  - payment_fee_debit_card
  - payment_fee_wallet
  - payment_fee_pix

  # Refunds
  - refund_locked:
      non_negative: true
  - refund_confirmed

  - refund_fee_merchant
  - refund_fee_partner

  # Chargebacks
  - chargeback_locked:
      non_negative: true
  - chargeback_loss

  - chargeback_fee_merchant
  - chargeback_fee_partner

  # Investment
  - customer_investment
  - customer_trade
  - customer_trade_fee


#
# Entry pairs.
#
# Books are pairwise recorded wrapped in entry pairs.
# Custom entry pairs use verbs to denote motion between books.
#
entry_pairs:
  # Balances
  withhold_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_withheld
  settle_merchant_balance:
    book_sub: merchant_pending
    book_add: merchant_available
  lock_merchant_balance:
    book_sub: merchant_available
    book_add: merchant_locked
  adjust_merchant_balance:
    book_sub: merchant_adjusted
    book_add: merchant_available
  apply_merchant_credit:
    book_sub: merchant_credit
    book_add: merchant_available

  withhold_partner_balance:
    book_sub: partner_available
    book_add: partner_withheld
  settle_partner_balance:
    book_sub: partner_pending
    book_add: partner_available
  lock_partner_balance:
    book_sub: partner_available
    book_add: partner_locked
  adjust_partner_balance:
    book_sub: partner_adjusted
    book_add: partner_available
  apply_partner_credit:
    book_sub: partner_credit
    book_add: partner_available

  withhold_customer_balance:
    book_sub: customer_available
    book_add: customer_withheld
  settle_customer_balance:
    book_sub: customer_pending
    book_add: customer_available
  lock_customer_balance:
    book_sub: customer_available
    book_add: customer_locked
  adjust_customer_balance:
    book_sub: customer_adjusted
    book_add: customer_available
  apply_customer_credit:
    book_sub: customer_credit
    book_add: customer_available
  
  # Withdrawals
  #
  # Lifecycle per stakeholder type:
  #   *_available -> wdw_*_locked       (LockWithdrawal)
  #   wdw_*_locked -> *_available       (CancelWithdrawal, before settlement)
  #   wdw_*_locked -> wdw_*_confirmed   (ConfirmWithdrawal, on settlement)
  #   wdw_*_confirmed -> *_available    (ReverseWithdrawal, post-settlement reject)
  #
  # `wdw_*_locked` carries in-flight withdrawals; `wdw_*_confirmed` accumulates
  # settled ones (reversible only via ReverseWithdrawal).
  lock_withdrawal_merchant:
    book_sub: merchant_available
    book_add: wdw_merchant_locked
  cancel_withdrawal_merchant:
    book_sub: wdw_merchant_locked
    book_add: merchant_available
  confirm_withdrawal_merchant:
    book_sub: wdw_merchant_locked
    book_add: wdw_merchant_confirmed
  reverse_withdrawal_merchant:
    book_sub: wdw_merchant_confirmed
    book_add: merchant_available

  lock_withdrawal_partner:
    book_sub: partner_available
    book_add: wdw_partner_locked
  cancel_withdrawal_partner:
    book_sub: wdw_partner_locked
    book_add: partner_available
  confirm_withdrawal_partner:
    book_sub: wdw_partner_locked
    book_add: wdw_partner_confirmed
  reverse_withdrawal_partner:
    book_sub: wdw_partner_confirmed
    book_add: partner_available

  lock_withdrawal_customer:
    book_sub: customer_available
    book_add: wdw_customer_locked
  cancel_withdrawal_customer:
    book_sub: wdw_customer_locked
    book_add: customer_available
  confirm_withdrawal_customer:
    book_sub: wdw_customer_locked
    book_add: wdw_customer_confirmed
  reverse_withdrawal_customer:
    book_sub: wdw_customer_confirmed
    book_add: customer_available
  
  # Withdrawal fees
  charge_withdrawal_fee_merchant:
    book_sub: merchant_available
    book_add: wdw_merchant_fee
  charge_withdrawal_fee_partner:
    book_sub: partner_available
    book_add: wdw_partner_fee
  charge_withdrawal_fee_customer:
    book_sub: customer_available
    book_add: wdw_customer_fee
  
  # Deposits
  confirm_deposit_merchant:
    book_sub: merchant_deposit
    book_add: merchant_available

  confirm_deposit_partner:
    book_sub: partner_deposit
    book_add: partner_available

  confirm_deposit_customer:
    book_sub: customer_deposit
    book_add: customer_available

  # Charges
  charge_bank_transfer:
    book_sub: charged_bank_transfer
    book_add: payment
  charge_credit_card:
    book_sub: charged_credit_card
    book_add: payment
  charge_debit_card:
    book_sub: charged_debit_card
    book_add: payment
  charge_wallet:
    book_sub: charged_wallet
    book_add: payment
  charge_pix:
    book_sub: charged_pix
    book_add: payment

  # Charge fees
  charge_bank_transfer_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_bank_transfer
  charge_bank_transfer_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_bank_transfer

  charge_credit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_credit_card
  charge_credit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_credit_card
  
  charge_debit_card_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_debit_card
  charge_debit_card_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_debit_card
  
  charge_wallet_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_wallet
  charge_wallet_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_wallet
  charge_wallet_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_wallet

  charge_pix_fee_merchant:
    book_sub: merchant_available
    book_add: payment_fee_pix
  charge_pix_fee_partner:
    book_sub: partner_available
    book_add: payment_fee_pix
  charge_pix_fee_customer:
    book_sub: customer_available
    book_add: payment_fee_pix

  # Splits
  split_payment_merchant:
    book_sub: payment
    book_add: merchant_pending
  split_payment_partner:
    book_sub: payment
    book_add: partner_pending
  
  # Refunds
  lock_refund_merchant:
    book_sub: merchant_available
    book_add: refund_locked
  lock_refund_partner:
    book_sub: partner_available
    book_add: refund_locked

  confirm_refund:
    book_sub: refund_locked
    book_add: refund_confirmed
  # Refund is a liability transfer, not a P&L event: funds move from the
  # funder's available book to customer_available, conserving total platform
  # liability. Funder identity (merchant vs partner) is consumed at
  # lock_refund_*, so refund_confirmed is fungible and settle has only one
  # destination by design. If refunds ever need to route elsewhere
  # (void-to-merchant, third party), split into settle_refund_customer /
  # settle_refund_merchant variants and re-thread funder identity through
  # confirm_refund.
  settle_refund:
    book_sub: refund_confirmed
    book_add: customer_available
  
  # Refund fees
  charge_refund_fee_merchant:
    book_sub: merchant_available
    book_add: refund_fee_merchant
  
  charge_refund_fee_partner:
    book_sub: partner_available
    book_add: refund_fee_partner
  
  # Chargebacks
  lock_chargeback_merchant:
    book_sub: merchant_available
    book_add: chargeback_locked
  lock_chargeback_partner:
    book_sub: partner_available
    book_add: chargeback_locked
  
  # Chargeback is loss recognition, not a liability transfer: chargeback_loss
  # is a terminal P&L sink (parallel to chargeback_fee_*), since the issuing
  # bank has already paid the cardholder externally. There is no settle step,
  # and no reversal pair — if dispute reversals ever become a real flow, add
  # explicit reverse_* pairs keyed by funder; do not call Chargeback with a
  # negative amount.
  confirm_chargeback:
    book_sub: chargeback_locked
    book_add: chargeback_loss
  
  # Chargeback fees
  charge_chargeback_fee_merchant:
    book_sub: merchant_available
    book_add: chargeback_fee_merchant
  
  charge_chargeback_fee_partner:
    book_sub: partner_available
    book_add: chargeback_fee_partner

  # Investments
  investment_invest:
    book_sub: customer_available
    book_add: customer_investment
  investment_trade_operation:
    book_sub: customer_available
    book_add: customer_investment
  investment_trade:
    book_sub: customer_trade
    book_add: customer_investment
  investment_trade_fee:
    book_sub: customer_trade_fee
    book_add: customer_investment
