name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: RSpec + RuboCop (Ruby .ruby-version, PG 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      STERN_CHART: general
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Auto-reads .ruby-version when ruby-version is omitted.
          bundler-cache: true

      - name: Create test database
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE stern_dummy_test;"

      - name: Load schema into test database
        run: bundle exec rails app:db:schema:load

      - name: Run RSpec
        run: bundle exec rspec

      - name: Run RuboCop
        run: bundle exec rubocop

      # Smoke benchmark: keeps the bench harness exercised by CI and surfaces
      # ops/s + p50/p95/p99 in the build log. Strict mode (set via env) makes
      # the step exit non-zero on either a recorded operation error during the
      # measured window or a ledger that fails Stern::Doctor.amount_consistent?
      # at the end. We deliberately do not gate on absolute latency or
      # throughput thresholds — shared CI runners are noisy enough that
      # absolute numbers would flap; regressions show up in the printed
      # latency table for a human to notice in PR review.
      - name: Benchmark smoke (ChargePix)
        env:
          STERN_BENCH_STRICT: "1"
        run: |
          bundle exec ruby scripts/benchmark/run.rb \
            --op=charge_pix \
            --threads=4 \
            --iterations=200 \
            --warmup=20 \
            --merchants=8
